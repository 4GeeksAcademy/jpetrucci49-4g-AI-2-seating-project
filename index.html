<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinema Seating System</title>
  </head>
  <body class="min-h-screen text-slate-900">
    <main class="mx-auto flex min-h-screen w-full max-w-6xl flex-col gap-6 p-4 sm:p-8">
      <header class="rounded-3xl border border-amber-100/60 bg-white/80 p-6 shadow-lg backdrop-blur">
        <p class="text-xs font-semibold uppercase tracking-[0.25em] text-amber-700">Conema Box Office</p>
        <h1 class="mt-2 text-3xl font-bold tracking-tight sm:text-4xl">Screening Room Seat Manager</h1>
        <p class="mt-3 max-w-3xl text-sm text-slate-600 sm:text-base">
          Reserve seats, test scenarios, count occupancy, and detect the first adjacent pair.
        </p>
      </header>

      <section class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
        <div class="rounded-3xl border border-slate-200 bg-white/90 p-4 shadow-md sm:p-6">
          <h2 class="text-xl font-semibold">Seat Map</h2>
          <p class="mt-1 text-sm text-slate-600">Click any available seat to reserve it instantly.</p>
          <div id="seat-map" class="mt-4 overflow-auto"></div>
        </div>

        <aside class="space-y-6">
          <section class="rounded-3xl border border-slate-200 bg-white/90 p-4 shadow-md sm:p-6">
            <h2 class="text-xl font-semibold">Reserve by Position</h2>
            <form id="reserve-form" class="mt-4 grid grid-cols-2 gap-3">
              <label class="text-sm font-medium text-slate-700" for="row-input">Row (1-8)</label>
              <input
                id="row-input"
                type="number"
                min="1"
                max="8"
                required
                class="rounded-xl border border-slate-300 px-3 py-2 text-sm focus:border-amber-500 focus:outline-none"
              />
              <label class="text-sm font-medium text-slate-700" for="col-input">Column (1-10)</label>
              <input
                id="col-input"
                type="number"
                min="1"
                max="10"
                required
                class="rounded-xl border border-slate-300 px-3 py-2 text-sm focus:border-amber-500 focus:outline-none"
              />
              <button
                type="submit"
                class="col-span-2 rounded-xl bg-amber-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-amber-700"
              >
                Reserve Seat
              </button>
            </form>
          </section>

          <section class="rounded-3xl border border-slate-200 bg-white/90 p-4 shadow-md sm:p-6">
            <h2 class="text-xl font-semibold">Test Scenarios</h2>
            <div class="mt-4 grid grid-cols-2 gap-2">
              <button data-scenario="empty" class="scenario-btn rounded-xl border border-slate-300 px-3 py-2 text-sm font-medium hover:border-amber-500 hover:text-amber-700">Empty Room</button>
              <button data-scenario="partial" class="scenario-btn rounded-xl border border-slate-300 px-3 py-2 text-sm font-medium hover:border-amber-500 hover:text-amber-700">Partially Filled</button>
              <button data-scenario="nearly" class="scenario-btn rounded-xl border border-slate-300 px-3 py-2 text-sm font-medium hover:border-amber-500 hover:text-amber-700">Nearly Full</button>
              <button data-scenario="full" class="scenario-btn rounded-xl border border-slate-300 px-3 py-2 text-sm font-medium hover:border-amber-500 hover:text-amber-700">Full Room</button>
            </div>
            <button
              id="adjacent-btn"
              class="mt-4 w-full rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-700"
            >
              Find First Adjacent Pair
            </button>
          </section>
        </aside>
      </section>

      <section class="grid gap-6 lg:grid-cols-2">
        <article class="rounded-3xl border border-slate-200 bg-white/90 p-4 shadow-md sm:p-6">
          <h2 class="text-xl font-semibold">Matrix Output</h2>
          <pre id="matrix-output" class="mt-4 rounded-2xl bg-slate-900 p-4 text-xs text-emerald-200 sm:text-sm"></pre>
        </article>

        <article class="rounded-3xl border border-slate-200 bg-white/90 p-4 shadow-md sm:p-6">
          <h2 class="text-xl font-semibold">System Messages</h2>
          <div id="messages" class="mt-4 max-h-80 space-y-2 overflow-auto text-sm"></div>
        </article>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
